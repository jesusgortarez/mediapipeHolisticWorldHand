name: Build MediaPipe Wheels (Desktop Platforms)

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: "Compilar para Windows"
        type: boolean
        default: true
      build_linux:
        description: "Compilar para Linux (manylinux)"
        type: boolean
        default: false
      build_macos:
        description: "Compilar para macOS (Intel y Apple Silicon)"
        type: boolean
        default: false

jobs:
  build-windows:
    if: ${{ inputs.build_windows }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            python-tag: "py39"
          - python-version: "3.10"
            python-tag: "py310"
          - python-version: "3.11"
            python-tag: "py311"
          - python-version: "3.12"
            python-tag: "py312"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Pinned)
        run: |
          python -m pip install --upgrade pip==24.0
          pip install setuptools==69.5.1 wheel==0.43.0 numpy==1.26.4 opencv-python==4.9.0.80 protobuf==4.24.4

      - name: Install MSYS2 (Pinned)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            patch
            unzip

      - name: Descargar e instalar OpenCV 3.4.10 para Windows
        shell: bash
        run: |
          # Descarga
          curl -L https://github.com/opencv/opencv/releases/download/3.4.10/opencv-3.4.10-vc14_vc15.exe -o opencv_installer.exe

          # Extracción forzada usando 7z
          7z x opencv_installer.exe -o/c/

          # Verificación con rutas estilo Bash para evitar errores de escape
          echo "Verificando instalación de OpenCV..."
          if [ -d "/c/opencv/build/x64/vc15/lib" ]; then
            echo "Directorio encontrado. Listando archivos:"
            ls /c/opencv/build/x64/vc15/lib/opencv_world3410*
          else
            echo "ERROR: No se encontró la ruta de OpenCV. Contenido de C:/"
            ls -d /c/*/
            exit 1
          fi

      - name: Forzar Bazel 6.5.0 nativo
        shell: bash
        run: |
          mkdir -p /c/bazel_custom
          curl -L https://github.com/bazelbuild/bazel/releases/download/6.5.0/bazel-6.5.0-windows-x86_64.exe -o /c/bazel_custom/bazel.exe
          echo "C:\bazel_custom" >> $GITHUB_PATH

      - name: Install Bazelisk (Pinned)
        run: npm install -g @bazel/bazelisk@1.19.0

      - name: Install protoc (Pinned)
        uses: arduino/setup-protoc@v3
        with:
          version: "24.4"

      - name: Configurar recursos de Bazel
        shell: bash
        run: |
          echo "build --jobs=1" >> .bazelrc
          echo "build --local_ram_resources=4096" >> .bazelrc
          echo "build --define MEDIAPIPE_DISABLE_GPU=1" >> .bazelrc

      - name: Corregir error de version PEP 440 en setup.py
        shell: bash
        run: sed -i "s/'dev'/'0.10.21'/g" setup.py

      - name: Build Python Wheel (Windows, ${{ matrix.python-version }})
        run: python setup.py bdist_wheel
        env:
          BAZEL_VC: "C:\\Program Files\\Microsoft Visual Studio\\2022\\Enterprise\\VC"
          USE_BAZEL_VERSION: "6.5.0"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediapipe-wheel-windows-${{ matrix.python-tag }}
          path: dist/*.whl

  build-linux:
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            python-tag: "py39"
            cibw-build: "cp39-*"
          - python-version: "3.10"
            python-tag: "py310"
            cibw-build: "cp310-*"
          - python-version: "3.11"
            python-tag: "py311"
            cibw-build: "cp311-*"
          - python-version: "3.12"
            python-tag: "py312"
            cibw-build: "cp312-*"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Corregir error de version PEP 440 en setup.py
        shell: bash
        run: sed -i "s/'dev'/'0.10.21'/g" setup.py

      - name: Build Linux wheels with cibuildwheel (${{ matrix.python-version }})
        uses: pypa/cibuildwheel@v2.17.0
        env:
          CIBW_BUILD: ${{ matrix.cibw-build }}
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ENVIRONMENT: "USE_BAZEL_VERSION=6.5.0"
          CIBW_BEFORE_BUILD: >
            python -m pip install --upgrade pip==24.0 &&
            pip install setuptools==69.5.1 wheel==0.43.0 numpy==1.26.4 opencv-python==4.9.0.80 protobuf==4.24.4
          CIBW_BEFORE_ALL: >
            curl -L https://github.com/bazelbuild/bazel/releases/download/6.5.0/bazel-6.5.0-linux-x86_64 -o /usr/local/bin/bazel &&
            chmod +x /usr/local/bin/bazel &&
            curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v24.4/protoc-24.4-linux-x86_64.zip &&
            unzip -o protoc-24.4-linux-x86_64.zip -d /usr/local &&
            chmod +x /usr/local/bin/protoc

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mediapipe-wheel-linux-manylinux-${{ matrix.python-tag }}
          path: ./wheelhouse/*.whl

  build-macos-intel:
    if: ${{ inputs.build_macos }}
    runs-on: macos-13
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            python-tag: "py39"
          - python-version: "3.10"
            python-tag: "py310"
          - python-version: "3.11"
            python-tag: "py311"
          - python-version: "3.12"
            python-tag: "py312"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies (Pinned)
        run: |
          python -m pip install --upgrade pip==24.0
          pip install setuptools==69.5.1 wheel==0.43.0 numpy==1.26.4 opencv-python==4.9.0.80 protobuf==4.24.4

      - name: Forzar Bazel 6.5.0 nativo
        shell: bash
        run: |
          mkdir -p /tmp/bazel_custom
          curl -L https://github.com/bazelbuild/bazel/releases/download/6.5.0/bazel-6.5.0-darwin-x86_64 -o /tmp/bazel_custom/bazel
          chmod +x /tmp/bazel_custom/bazel
          echo "/tmp/bazel_custom" >> $GITHUB_PATH

      - name: Install Bazelisk (Pinned)
        run: npm install -g @bazel/bazelisk@1.19.0

      - name: Install protoc (Pinned)
        uses: arduino/setup-protoc@v3
        with:
          version: "24.4"

      - name: Configurar recursos de Bazel
        shell: bash
        run: |
          echo "build --jobs=1" >> .bazelrc
          echo "build --local_ram_resources=4096" >> .bazelrc
          echo "build --define MEDIAPIPE_DISABLE_GPU=1" >> .bazelrc

      - name: Corregir error de version PEP 440 en setup.py
        shell: bash
        run: sed -i "s/'dev'/'0.10.21'/g" setup.py

      - name: Build Python Wheel (macOS Intel, ${{ matrix.python-version }})
        run: python setup.py bdist_wheel
        env:
          USE_BAZEL_VERSION: "6.5.0"

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediapipe-wheel-macos-intel-${{ matrix.python-tag }}
          path: dist/*.whl

  build-macos-silicon:
    if: ${{ inputs.build_macos }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            python-tag: "py39"
          - python-version: "3.10"
            python-tag: "py310"
          - python-version: "3.11"
            python-tag: "py311"
          - python-version: "3.12"
            python-tag: "py312"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies (Pinned)
        run: |
          python -m pip install --upgrade pip==24.0
          pip install setuptools==69.5.1 wheel==0.43.0 numpy==1.26.4 opencv-python==4.9.0.80 protobuf==4.24.4

      - name: Forzar Bazel 6.5.0 nativo
        shell: bash
        run: |
          mkdir -p /tmp/bazel_custom
          curl -L https://github.com/bazelbuild/bazel/releases/download/6.5.0/bazel-6.5.0-darwin-arm64 -o /tmp/bazel_custom/bazel
          chmod +x /tmp/bazel_custom/bazel
          echo "/tmp/bazel_custom" >> $GITHUB_PATH

      - name: Install Bazelisk (Pinned)
        run: npm install -g @bazel/bazelisk@1.19.0

      - name: Install protoc (Pinned)
        uses: arduino/setup-protoc@v3
        with:
          version: "24.4"

      - name: Configurar recursos de Bazel
        shell: bash
        run: |
          echo "build --jobs=1" >> .bazelrc
          echo "build --local_ram_resources=4096" >> .bazelrc
          echo "build --define MEDIAPIPE_DISABLE_GPU=1" >> .bazelrc

      - name: Corregir error de version PEP 440 en setup.py
        shell: bash
        run: sed -i "s/'dev'/'0.10.21'/g" setup.py

      - name: Build Python Wheel (macOS Apple Silicon, ${{ matrix.python-version }})
        run: python setup.py bdist_wheel
        env:
          USE_BAZEL_VERSION: "6.5.0"

      - name: Upload macOS Silicon artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediapipe-wheel-macos-silicon-${{ matrix.python-tag }}
          path: dist/*.whl
